name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      # 3. Download dependencies
      - name: Download dependencies
        run: go mod download

      # 4. Verify dependencies
      - name: Verify dependencies
        run: go mod verify

      # 5. Build
      - name: Build
        run: go build ./...

      # 6. Static analysis
      - name: Vet
        run: go vet ./...